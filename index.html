<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <!-- เป็นfont-familyชื่อ"Material Symbols Rounded" จากgoogle โดยจะเป็นพวก สัญลักษณ์ เพื่อเอาไปใช้กับicon ต่างในเว็บ -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- <script src="https://kit.fontawesome.com/f5376a0119.js" crossorigin="anonymous"></script> -->
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">  
  <!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> -->
  <script src="https://kit.fontawesome.com/f5376a0119.js" crossorigin="anonymous"></script>
  <title>เสียงบรรยายMuseum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <main class="content">
    <!-- ส่วนหัวด้านบน expand_moreคือส่วนหนึ่งของfontgoogle ที่ดึงมาใช้ จะเป็น icon ต่างที่สามารถ -->
    <!-- <div class="top-bar">
      <span class="material-symbols-rounded">expand_more</span>
      <span>Now Playing</span>
      <span class="material-symbols-rounded">m  ore_horiz</span>
    </div> -->
    <!-- แสดงรูป -->
    <div class="image-wrapper">
      <div class="music-image">
        <img src="" alt="" class="rotate" ;>
      </div>
    </div>

    <div class="music-titles">
      <p class="artist" style="font-family: Kanit, sans-serif;"></p>
      <p class="name" style="font-family: Kanit, sans-serif;"></p>
      <!-- <div id="musicList"> -->
        <!-- ข้อมูลจะถูกแสดงที่นี่ -->
      <!-- </div> -->
    </div>
    <!-- แถบหลอดเวลา -->
    <div class="progress-details">
      <div class="progress-bar">
        <span></span>
      </div>
      <div class="time">
        <span class="current" style="font-family: Kanit, sans-serif;">0:00</span>
        <span class="final" style="font-family: Kanit, sans-serif;"></span>
      </div>
    </div>
    <!-- ควบคุมการเล่น -->
    <div class="control-btn">
      <span class="material-symbols-rounded" id="prev">skip_previous</span>
      <div class="play-pause">
        <span class="material-symbols-rounded">play_arrow</span>
      </div>
      <span class="material-symbols-rounded" id="next">skip_next</span>
    </div>
    <!-- <div class="volune-datails">
      <div class="volune-bar">
        <span></span>
      </div>
      <span class="material-symbols-outlined" id="v-min">volume_mute</span>
      <span class="material-symbols-outlined" id="v-max">volume_up</span> 
    </div> -->
    <div class="number-buttons">
      <div class="display-number" style="font-family: Kanit, sans-serif;">&nbsp;</div>
        <button class="number-button" data-number="1" style="font-family: Kanit, sans-serif;">1</button>
        <button class="number-button" data-number="2" style="font-family: Kanit, sans-serif;">2</button>
        <button class="number-button" data-number="3" style="font-family: Kanit, sans-serif;">3</button>
        <button class="number-button" data-number="4" style="font-family: Kanit, sans-serif;">4</button>
        <button class="number-button" data-number="5" style="font-family: Kanit, sans-serif;">5</button>
        <button class="number-button" data-number="6" style="font-family: Kanit, sans-serif;">6</button>
        <button class="number-button" data-number="7" style="font-family: Kanit, sans-serif;">7</button>
        <button class="number-button" data-number="8" style="font-family: Kanit, sans-serif;">8</button>
        <button class="number-button" data-number="9" style="font-family: Kanit, sans-serif;">9</button>
        <span></span>
        <button class="number-button" data-number="0" style="font-family: Kanit, sans-serif;">0</button>
        <!-- <button class="number-button" data-action="delete" style="font-family: Kanit, sans-serif;">ลบ</button> -->
    </div>
  </main>
  <!-- เล่นเพลง -->
  
  <audio src="" class="main-song"></audio>
  <!-- เพิ่ม jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
  <!-- ดึงข้อมูล -->
  <script src="js/playlist.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
